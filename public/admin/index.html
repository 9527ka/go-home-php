<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>回家了么 · 管理后台</title>
<link rel="stylesheet" href="css/admin.css">
</head>
<body>

<!-- ============ LOGIN PAGE ============ -->
<div id="loginPage" class="login-wrapper">
  <div class="login-box">
    <div class="brand">
      <div class="logo">🏠</div>
      <h1>回家了么</h1>
      <p>管理后台</p>
    </div>
    <form id="loginForm" autocomplete="off">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="loginUsername" placeholder="请输入管理员用户名" autofocus>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="loginPassword" placeholder="请输入密码">
      </div>
      <button type="submit" class="btn-login" id="btnLogin">登 录</button>
    </form>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ============ MAIN LAYOUT ============ -->
<div id="appLayout" class="layout hidden">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="logo">🏠</div>
      <h2>回家了么</h2>
      <span>管理后台 v1.0</span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item active" data-page="dashboard" onclick="switchPage('dashboard')">
        <span class="icon">📊</span>
        <span>数据概览</span>
      </div>
      <div class="nav-item" data-page="audit" onclick="switchPage('audit')">
        <span class="icon">📋</span>
        <span>内容审核</span>
        <span class="badge hidden" id="auditBadge">0</span>
      </div>
      <div class="nav-item" data-page="reports" onclick="switchPage('reports')">
        <span class="icon">🚨</span>
        <span>举报管理</span>
        <span class="badge hidden" id="reportBadge">0</span>
      </div>
      <div class="nav-item" data-page="users" onclick="switchPage('users')">
        <span class="icon">👥</span>
        <span>用户管理</span>
      </div>
      <div class="nav-item" data-page="clues" onclick="switchPage('clues')">
        <span class="icon">💡</span>
        <span>线索管理</span>
      </div>
      <div class="nav-item" data-page="managers" onclick="switchPage('managers')">
        <span class="icon">🛡️</span>
        <span>管理员管理</span>
      </div>
      <div class="nav-item" data-page="signin" onclick="switchPage('signin')">
        <span class="icon">📅</span>
        <span>签到管理</span>
      </div>
      <div class="nav-item" data-page="wallet" onclick="switchPage('wallet')">
        <span class="icon">💰</span>
        <span>钱包管理</span>
      </div>
      <div class="nav-item" data-page="settings" onclick="switchPage('settings')">
        <span class="icon">⚙️</span>
        <span>系统设置</span>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="admin-info">
        <div class="avatar" id="adminAvatar">A</div>
        <div>
          <div class="name" id="adminName">管理员</div>
          <div class="role" id="adminRole">admin</div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">退出登录</button>
    </div>
  </aside>

  <!-- Main Content — pages are loaded dynamically -->
  <main class="main-content" id="mainContent"></main>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- ============ JavaScript (load order matters) ============ -->
<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/audit.js"></script>
<script src="js/reports.js"></script>
<script src="js/users.js"></script>
<script src="js/clues.js"></script>
<script src="js/managers.js"></script>
<script src="js/wallet.js"></script>
<script src="js/signin.js"></script>
<script src="js/settings.js"></script>
</body>
</html>
